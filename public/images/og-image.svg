<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Purple gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Main content area -->
  <g>
    <!-- Drum icon (simplified) -->
    <circle cx="600" cy="180" r="60" fill="white" opacity="0.9"/>
    <circle cx="600" cy="180" r="50" fill="#667eea"/>
    <circle cx="570" cy="160" r="8" fill="white" opacity="0.8"/>
    <circle cx="615" cy="160" r="8" fill="white" opacity="0.8"/>
    <circle cx="600" cy="195" r="8" fill="white" opacity="0.8"/>
    <circle cx="575" cy="185" r="6" fill="white" opacity="0.7"/>

    <!-- Main headline: GROOVY -->
    <text x="600" y="280" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="700" text-anchor="middle" fill="white">
      GROOVY
    </text>

    <!-- Subheading -->
    <text x="600" y="335" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="600" text-anchor="middle" fill="white" opacity="0.98">
      Create Professional Drum Grooves
    </text>

    <!-- Divider line -->
    <line x1="250" y1="365" x2="950" y2="365" stroke="white" stroke-width="2" opacity="0.4"/>

    <!-- Features -->
    <text x="600" y="435" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="500" text-anchor="middle" fill="white" opacity="0.95">
      🥁 4/4 • 120 BPM • Mix • Export
    </text>

    <!-- Call-to-Action box -->
    <rect x="250" y="475" width="700" height="85" rx="12" fill="white" opacity="0.18" stroke="white" stroke-width="2" opacity="0.3"/>
    <text x="600" y="535" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="white">
      ▶ Create Your Groove Now
    </text>
  </g>
</svg>
